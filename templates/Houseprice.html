<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='Houseprice_pred.css') }}?v=2">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="container">
    <h1>House Price Prediction</h1>
    <p>Enter house details to estimate price</p>

    <form action="/predict" method="POST">

        <div class="form-group">
            <label><i class="fa-solid fa-ruler-combined"></i> Area (sq ft)</label>
            <input type="number" name="area" placeholder="Enter area (sq ft)" required>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-bed"></i> Bedrooms</label>
            <input type="number" name="bedrooms" placeholder="Enter bedrooms" required>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-location-dot"></i> Location</label>
            <select name="location" required>
                <option value="Downtown">Downtown</option>
                <option value="Suburban">Suburban</option>
                <option value="Rural">Rural</option>
            </select>
        </div>

        <button type="submit">
            <i class="fa-solid fa-calculator"></i> Predict Price
        </button>
    </form>

    {% if prediction %}
        <div class="result">
            Predicted Price: ₹ {{ prediction }}
        </div>
    {% endif %}
</div>
</body>
</html>
